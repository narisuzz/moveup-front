<div style="position: relative;">
  <section>
    <div class="container body_containerPadding">
      <div class="col-md-2 col-sm-2"></div>

      <div class="col-md-8 col-sm-8 col-xs-12">

        <div class="col-md-12 col-sm-12 col-xs-12 padding_zero" style="overflow: hidden;">

          <!-- 会員限定 -->
          <div ng-if="results.type==1" class="announcementsDetail_imgLogo">
            <div class="announcementsDetail_subLogo">
              <span>会員限定</span>
            </div>
          </div>

          <!-- すべての方 -->
          <div ng-if="results.type==2"
               class="announcementsDetail_imgLogo"
               style="background-color:#A9A9A9">
            <div class="announcementsDetail_subLogo">
              <span>すべての方</span>
            </div>
          </div>

          <!-- お気に入り追加 -->
          <div class="announcements_btn"
               ng-click="addMyPage()"
               ng-if="results.favorite==false">
            <p>
              お気に入り
              <i class="fa fa-star-o"></i>
            </p>
          </div>

          <!-- お気に入り済み -->
          <div class="announcements_btn"
               style="background-color:#A9A9A9"
               ng-click="RemoveMyPage()"
               ng-if="results.favorite==true">
            <p>
              お気に入り済み
              <i class="fa fa-star-o"></i>
            </p>
          </div>

          <!-- YouTube動画 -->
          <div ng-if="results.YouTubeVideoUrl!=null">
            <iframe
              class="announcementsDetail_pic"
              ng-src="{{YouTubeVideoUrl}}"
              allow="autoplay; encrypted-media"
              frameborder="0"
              allowfullscreen
              scrolling="no"
              controlsList="nodownload">
            </iframe>
          </div>

          <!-- AWS画像 -->
          <div ng-if="results.AWSVideoUrl!=null">
            <img
              class="announcementsDetail_pic"
              ng-src="{{results.AWSVideoUrl}}"
              style="width:100%; height:auto; object-fit:cover;"
              alt="announcement image">
          </div>
          <!-- Pic画像 -->
          <div ng-if="results.picUrl!=null">
            <img
              class="announcementsDetail_pic"
              ng-src="{{results.picUrl}}"
              style="width:100%; height:auto; object-fit:cover;"
              alt="announcement image">
          </div>

        </div>

        <!-- 詳細 -->
        <div class="col-md-12 col-sm-12 col-xs-12 padding_zero announcementsDetail_div">

          <div class="col-md-12 col-sm-12 col-xs-12 announcementsDetail_date">
            <span>{{results.date}}</span>
          </div>

          <div class="col-md-12 col-sm-12 col-xs-12 announcementsDetail_title">
            <p>{{results.title}}</p>
          </div>

          <div class="col-md-12 col-sm-12 col-xs-12 announcementsDetail_content">
            <label ng-bind-html="results.detail"></label>
          </div>

          <!-- 广告 -->
          <div id="ad" class="ad displayPc" align="center"></div>

        </div>

      </div>

      <div class="col-md-2 col-sm-12"></div>

    </div>
  </section>
</div>

<!-- footer -->
<div ng-include="'views/footer.html'"
     ng-hide="hideFooter"
     style="position: relative;z-index:999;">
</div>
