<div style="position: relative;">
<section class="minHeightVh100">
    <div class="container body_containerPadding">
        <div class="col-md-12 col-sm-12 col-xs-12 padding_zero display"><span class="list_title">MOVE UP ANNOUNCE</span></div>
        <div class="col-md-12 col-sm-12 col-xs-12 padding_zero displayPc"><span class="list_title">ANNOUNCE</span></div>
        <div class="col-md-12 col-sm-12 col-xs-12 event_padding4">
            <div class="col-md-6 col-sm-12 display"></div>
            <a href="/announcements/0/1/"><div class="col-md-1 col-sm-2 col-xs-4 event_paddingLR5"><button type="button" class="rise_btn_submit" style="background-color: black">ALL</button></div></a>
            <a href="/announcements/1/1/"><div class="col-md-1 col-sm-2 col-xs-4 event_paddingLR5"><button type="button" class="rise_btn_submit" style="background-color: #F40104">EVENT</button></div></a>
            <a href="/announcements/2/1/"><div class="col-md-1 col-sm-2 col-xs-4 event_paddingLR5"><button type="button" class="rise_btn_submit" style="background-color: #174981">MOVEUP</button></div></a>
            <a href="/announcements/3/1/"><div class="col-md-1 col-sm-2 col-xs-4 event_paddingLR5"><button type="button" class="rise_btn_submit" style="background-color: #2F9A51">NEWS</button></div></a>
<!--            <a href="/announcements/3/1/"><div class="col-md-1 col-sm-2 col-xs-4 event_paddingLR5"><button type="button" class="rise_btn_submit" style="background-color: #F41992">BEAUTY</button></div></a>-->
<!--            <a href="/announcements/2/1/"><div class="col-md-1 col-sm-2 col-xs-4 event_paddingLR5"><button type="button" class="rise_btn_submit" style="background-color: #F68028">KIDS</button></div></a>-->
        </div>
        <div class="col-md-12 col-sm-12 col-xs-12 padding_zero">
<!--          繰り返し処理、announcementsList中のデータを全部取り出し画面条に表示する-->
          <div ng-repeat="announcements in results.announcementsList">
            <div class="col-md-4 col-sm-4 col-xs-12 announcements_img_padding">
                <a href="/announcementsDetail/{{announcements.uuid}}/">
                    <div class="team-member wow fadeInUp" data-wow-duration="400ms" data-wow-delay="0ms">
                        <div class="col-md-12 col-sm-12 col-xs-12 padding_zero" style="overflow: hidden;">
                            <div class="announcements_imgLogo" style="{{announcements.color}}"><span>{{announcements.status}}</span></div>
                          <img ng-src="{{announcements.picUrl || 'images/no-image.png'}}" alt="" class="announcements_pic">
                        </div>
                        <div class="col-md-12 col-sm-12 col-xs-12 announcements_name_text">
                            <label class="lineStyle lineHid1">{{announcements.title}}</label>
                            <span class="rise_name2">{{announcements.date}}</span>
<!--                          条件に基づいて、表示するかしないか-->
                            <span ng-if="announcements.favorite==false" class="rise_name2"><br>{{announcements.office}}</span>
                            <span ng-if="announcements.favorite==true" class="rise_name2"><br>{{announcements.office}}</span>
                        </div>
                    </div>
                </a>
                <div class="col-md-12 col-sm-12 col-xs-12 announcements_star">
                    <span ng-if="announcements.favorite==true"><i class="fa fa-star announcements_i"></i></span>
                    <span ng-if="announcements.favorite==false"><i class="fa fa-star announcements_true"></i></span>
                </div>
                <div ng-if="$index == 1">
                    <div id="ad" class="ad displayPc" style="" align="center"></div>
                </div>
            </div>
          </div>
        </div>
        <div ng-bind-html="ad"></div>
        <div pagination class="col-md-12 col-sm-12 col-xs-12 change_page event_padding2" ng-hide="hidePages" align="center">
            <ul>
                <a href="javascript:void(0);"><li ng-click="upPageClick()">&lt;</li></a>
                <div id="pagesChange"></div>
                <a href="javascript:void(0);"><li ng-click="downPageClick()">&gt;</li></a>
            </ul>
        </div>
    </div>
</section><!--/#Store-->
</div>
<div ng-include="'views/footer.html'" ng-hide="hideFooter" style="position: relative;z-index:999;"></div>
